<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaquinha para o Lost</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    padding:40px;
    flex-wrap:wrap;
}

img{
    width:420px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,255,255,.25);
}

.pix{
    background:#1f1f1f;
    border:3px solid #00d26a;
    border-radius:20px;
    padding:40px;
    text-align:center;
    max-width:450px;
}

h1{
    margin-top:0;
    color:#00ff88;
}

.codigo{
    background:white;
    color:black;
    padding:15px;
    border-radius:10px;
    font-size:20px;
    margin:20px 0;
    word-break:break-all;
}

button{
    background:#00c853;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#00a844;
}
</style>
</head>

<body>

<div class="container">

<img src="thumb1.png" alt="Imagem 1">

<div class="pix">

<h1>❤️ AJUDE O LOST ❤️</h1>

<p>Se puder, faça um PIX de qualquer valor.</p>

<div class="codigo" id="pix">
LostSemteto67Vaquinha@sixseven.com
</div>

<button onclick="copiar()">Copiar PIX</button>

</div>

<img src="thumb2.png" alt="Imagem 2">

</div>

<script>
function copiar(){
navigator.clipboard.writeText("LostSemteto67Vaquinha@sixseven.com");
alert("PIX copiado com sucesso!");
}
</script>

</body>
</html>
